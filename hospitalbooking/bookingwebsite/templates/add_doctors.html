<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Doctor</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
    margin: 0;
}

.container {
    max-width: 750px;
    background: #fff;
    margin: 40px auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #2c3e50;
}

h3 {
    margin-top: 25px;
    color: #34495e;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
    color: #555;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #dcdcdc;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #27ae60;
}

.row {
    display: flex;
    gap: 15px;
}

.row .form-group {
    flex: 1;
}

/* DAYS */
.days {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.days label {
    background: #f1f3f6;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
}

.days input {
    margin-right: 5px;
}

/* ✅ TIME BUTTON STYLE */
.time-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.time-slots label {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 13px;
    background: #f8f9fb;
    transition: 0.3s;
}

.time-slots input {
    display: none;
}

/* SELECTED STATE */
.time-slots input:checked + span {
    background: #27ae60;
    color: white;
    border-color: #27ae60;
}

/* BUTTON */
.submit-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
}

.submit-btn:hover {
    opacity: 0.9;
}
</style>

</head>
<body>

<div class="container">
    <h2>Add Doctor</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- NAME -->
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>

        <!-- ROW -->
        <div class="row">
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" required>
            </div>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <!-- IMAGE -->
        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" name="image" required>
        </div>

        <!-- PROFESSIONAL -->
        <h3>Professional Details</h3>

        <div class="form-group">
            <label>Specialization</label>
            <input type="text" name="field" required>
        </div>

        <div class="form-group">
            <label>Qualification</label>
            <input type="text" name="qualification" required>
        </div>

        <div class="form-group">
            <label>Experience</label>
            <input type="number" name="experience" required>
        </div>

        <!-- DAYS -->
        <h3>Available Days</h3>
        <div class="days">
            <label><input type="checkbox" name="days" value="Monday"> Monday</label>
            <label><input type="checkbox" name="days" value="Tuesday"> Tuesday</label>
            <label><input type="checkbox" name="days" value="Wednesday"> Wednesday</label>
            <label><input type="checkbox" name="days" value="Thursday"> Thursday</label>
            <label><input type="checkbox" name="days" value="Friday"> Friday</label>
            <label><input type="checkbox" name="days" value="Saturday"> Saturday</label>
            <label><input type="checkbox" name="days" value="Sunday"> Sunday</label>
        </div>

        <!-- ✅ TIME SLOTS -->
        <h3>Available Time Slots</h3>

        <div class="time-slots">
            <label>
                <input type="checkbox" name="time_slots" value="9:00 AM - 10:00 AM">
                <span>9:00 AM - 10:00 AM</span>
            </label>

            <label>
                <input type="checkbox" name="time_slots" value="10:00 AM - 11:00 AM">
                <span>10:00 AM - 11:00 AM</span>
            </label>

            <label>
                <input type="checkbox" name="time_slots" value="11:00 AM - 12:00 PM">
                <span>11:00 AM - 12:00 PM</span>
            </label>

            <label>
                <input type="checkbox" name="time_slots" value="1:00 PM - 2:00 PM">
                <span>1:00 PM - 2:00 PM</span>
            </label>

            <label>
                <input type="checkbox" name="time_slots" value="2:00 PM - 3:00 PM">
                <span>2:00 PM - 3:00 PM</span>
            </label>

            <label>
                <input type="checkbox" name="time_slots" value="3:00 PM - 4:00 PM">
                <span>3:00 PM - 4:00 PM</span>
            </label>
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="submit-btn">
            Add Doctor
        </button>

    </form>
</div>

</body>
</html>

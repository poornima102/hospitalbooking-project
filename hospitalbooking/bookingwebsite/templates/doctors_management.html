<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Management</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    background: #2c3e50;
    color: white;
}

.header div {
    display: flex;
    gap: 10px;
}

.container { padding: 20px; }

.add-btn {
    background: #27ae60;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.back-btn {
    background: #34495e;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

table {
    width: 100%;
    background: white;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

th {
    background: #3498db;
    color: white;
}

img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
}

.btn {
    padding: 6px 10px;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.view-btn { background: #2980b9; }
.delete-btn { background: #e74c3c; }

/* ================= MODALS ================= */

.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    animation: pop 0.2s ease-in-out;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.modal-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

.modal-btn {
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.confirm-btn {
    background: #e74c3c;
    color: white;
}

.cancel-btn {
    background: #ccc;
}

/* SUCCESS MODAL */
.success-modal {
    border-left: 6px solid #2ecc71;
}

.success-modal h3 {
    color: #2ecc71;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Doctor Management</h2>

    <div>
        <a href="{% url 'dashboard' %}">
            <button class="back-btn">Home</button>
        </a>

        <a href="{% url 'add_doctor' %}">
            <button class="add-btn">+ Add Doctor</button>
        </a>
    </div>
</div>

<!-- TABLE -->
<div class="container">

<table>
    <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Specialization</th>
        <th>Actions</th>
    </tr>

{% for doctor in doctors %}
<tr id="row-{{ doctor.id }}">

    <td>
        {% if doctor.image %}
            <img src="{{ doctor.image.url }}">
        {% else %}
            <img src="https://via.placeholder.com/60">
        {% endif %}
    </td>

    <td>{{ doctor.name }}</td>
    <td>{{ doctor.field }}</td>

    <td>
        <a href="{% url 'view_doctor' doctor.id %}">
            <button class="btn view-btn">View</button>
        </a>

        <button class="btn delete-btn"
            onclick="openDeleteModal({{ doctor.id }})">
            Delete
        </button>
    </td>

</tr>
{% empty %}
<tr>
    <td colspan="4">No doctors found</td>
</tr>
{% endfor %}

</table>

</div>

<!-- ================= CONFIRM MODAL ================= -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal">
        <h3>Delete Doctor</h3>
        <p>Are you sure you want to delete this doctor?</p>

        <div class="modal-buttons">
            <button class="modal-btn cancel-btn" onclick="closeDeleteModal()">Cancel</button>
            <button class="modal-btn confirm-btn" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- ================= SUCCESS MODAL ================= -->
<div id="successModal" class="modal-overlay">
    <div class="modal success-modal">
        <h3 id="successText">Success</h3>
    </div>
</div>

<script>

let deleteId = null;

/* OPEN DELETE MODAL */
function openDeleteModal(id) {
    deleteId = id;
    document.getElementById("deleteModal").style.display = "flex";
}

/* CLOSE DELETE MODAL */
function closeDeleteModal() {
    document.getElementById("deleteModal").style.display = "none";
}

/* SUCCESS POPUP */
function showSuccess(msg) {
    const modal = document.getElementById("successModal");
    document.getElementById("successText").innerText = msg;

    modal.style.display = "flex";

    setTimeout(() => {
        modal.style.display = "none";
    }, 2000);
}

/* CONFIRM DELETE */
function confirmDelete() {

    fetch(`/delete-doctor/${deleteId}/`, {
        method: "POST",
        headers: {
            "X-CSRFToken": getCookie("csrftoken"),
            "Content-Type": "application/json"
        }
    })
    .then(res => res.json())
    .then(data => {

        closeDeleteModal();

        if (data.message) {
            document.getElementById("row-" + deleteId).remove();
            showSuccess("Doctor deleted successfully");
        } else {
            showSuccess("Delete failed");
        }
    });
}

/* CSRF */
function getCookie(name) {
    let cookieValue = null;
    document.cookie.split(";").forEach(cookie => {
        cookie = cookie.trim();
        if (cookie.startsWith(name + "=")) {
            cookieValue = decodeURIComponent(cookie.split("=")[1]);
        }
    });
    return cookieValue;
}

</script>

</body>
</html>

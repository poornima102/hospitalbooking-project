<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reports - Most Viewed Doctors</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

.header {
    background: #2c3e50;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
}

h3 {
    margin-bottom: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th {
    background: #3498db;
    color: white;
}

.top {
    color: #27ae60;
    font-weight: bold;
}

tr:hover {
    background-color: #f1f1f1;
}
</style>
</head>

<body>

<div class="header">
    <h2>Reports</h2>
</div>

<div class="container">

    <h3>Most Viewed Doctors</h3>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Doctor Name</th>
                <th>Views</th>
            </tr>
        </thead>

        <tbody>
        {% for doctor in doctors %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ doctor.name }}</td>
                <td class="{% if forloop.first %}top{% endif %}">
                    {{ doctor.view_count }}
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="3">No data available</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
